# Score-only control, 50 generations, 10 runs, low temperature
# Phase transition experiment: low-bandwidth channel (control)
name: qwen7b_score_only_50gen
description: "Score-only feedback, 50 gens, 10 runs, temp=0.3 for low noise"
seed: 42

agent_type: coding
num_generations: 50
num_runs: 10

feedback_mode: score_only

llm:
  provider: ollama
  base_url: http://localhost:11434/v1
  model: qwen2.5-coder:7b
  temperature: 0.3
  max_tokens: 4096
  api_key: ollama

benchmarks:
  benchmark_dir: benchmarks
  eval_timeout_seconds: 30
  task_sample_size: 50

mitigation:
  strategy: none

output_dir: results
log_level: INFO
embedding_model: all-MiniLM-L6-v2
