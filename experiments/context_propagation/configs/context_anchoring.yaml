# Context anchoring mitigation experiment
name: context_anchoring
description: "Context propagation with periodic anchoring to generation 0"
seed: 42

agent_type: coding
num_generations: 20
num_runs: 5

llm:
  provider: ollama
  base_url: http://localhost:11434/v1
  model: qwen2.5-coder:14b
  temperature: 0.7
  max_tokens: 4096
  api_key: ollama

benchmarks:
  benchmark_dir: benchmarks
  eval_timeout_seconds: 30

mitigation:
  strategy: context_anchoring
  anchor_interval: 5
  fidelity_threshold: 0.5

output_dir: results
log_level: INFO
embedding_model: all-MiniLM-L6-v2
