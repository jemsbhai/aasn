name: qwen2.5-coder-7b_coding_checksum
description: Model=qwen2.5-coder-7b, Agent=coding, Mitigation=checksum
seed: 42
agent_type: coding
num_generations: 20
spawning_prompt: ''
spawning_prompt_file: null
llm:
  provider: ollama
  base_url: http://localhost:11434/v1
  model: qwen2.5-coder:7b
  temperature: 0.7
  max_tokens: 4096
  api_key: ollama
benchmarks:
  benchmark_dir: benchmarks
  coding_tasks:
  - humaneval_subset
  - custom
  general_tasks:
  - reasoning
  - instruction_following
  prompt_tasks:
  - code_generation
  - analysis
  eval_timeout_seconds: 30
mitigation:
  strategy: checksumming
  anchor_interval: 5
  fidelity_threshold: 0.5
  store_path: results\context_store
  num_invariants: 5
  rot_rate_threshold: 0.1
  lookback_window: 3
num_runs: 5
output_dir: results
log_level: INFO
embedding_model: all-MiniLM-L6-v2
